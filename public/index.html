<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국방 인텔리전스 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#f0f2f5;--text2:#b0b8c8;--text3:#6b7590;
  --accent:#5b9fff;--accent2:#1c3a6e;
  --green:#4ade80;--amber:#fbbf24;--purple:#c084fc;--red:#f87171;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
html{font-size:18px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.75}
header{border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(13,15,20,.96);backdrop-filter:blur(16px);z-index:100}
.logo{font-family:var(--mono);font-size:13px;letter-spacing:.15em;color:var(--accent);display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.hdate{font-family:var(--mono);font-size:13px;color:var(--text3)}
main{max-width:960px;margin:0 auto;padding:3rem 2rem 6rem}
.hero{margin-bottom:2.5rem}
.hero-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--text3);margin-bottom:12px}
.hero-title{font-size:clamp(28px,3.5vw,40px);font-weight:700;line-height:1.15;margin-bottom:10px}
.hero-sub{font-size:16px;color:var(--text2)}
.cost-bar{display:flex;align-items:center;gap:10px;margin-top:12px;font-family:var(--mono);font-size:13px;color:var(--text3);flex-wrap:wrap}
.cost-pill{padding:3px 10px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:4px;color:var(--green)}
.ctrl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem 1.75rem;margin-bottom:2.5rem}
.ctrl-label{font-family:var(--mono);font-size:12px;color:var(--text3);letter-spacing:.14em;margin-bottom:14px;display:block}
.tech-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem}
.t-btn{font-family:var(--sans);font-size:14px;font-weight:500;padding:10px 8px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;text-align:center;line-height:1.35}
.t-btn .n{display:block;font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:3px}
.t-btn:hover,.t-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
.t-btn.active .n{color:#7ab5ff}
.action-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sel{font-size:15px;color:var(--text2)}
.sel strong{color:var(--accent);font-weight:600}
.btn-group{display:flex;gap:8px}
.gen-btn{font-family:var(--sans);font-size:16px;font-weight:600;padding:12px 28px;border-radius:9px;border:1px solid var(--accent);background:var(--accent2);color:var(--accent);cursor:pointer;transition:all .15s;white-space:nowrap}
.gen-btn:hover:not(:disabled){background:var(--accent);color:#fff}
.gen-btn:disabled{opacity:.3;cursor:not-allowed}
.nxt-btn{font-family:var(--sans);font-size:16px;font-weight:600;padding:12px 20px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;display:none}
.nxt-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.nxt-btn:disabled{opacity:.3;cursor:not-allowed}
.nxt-btn.show{display:block}
.status{font-family:var(--mono);font-size:13px;color:var(--text3);margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;min-height:22px}
.spinner{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.counter{display:none;font-family:var(--mono);font-size:12px;color:var(--text3);margin-bottom:1.25rem;padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.counter.show{display:block}
.empty{text-align:center;padding:4rem 1rem;border:1px dashed var(--border2);border-radius:14px;color:var(--text3);font-size:16px;line-height:2.2}
.err{padding:1.25rem 1.5rem;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:10px;color:var(--red);font-family:var(--mono);font-size:14px;line-height:1.7;word-break:break-all}
.cards{display:flex;flex-direction:column;gap:2.5rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-head{padding:1rem 1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg3);flex-wrap:wrap}
.card-head-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cnum{font-family:var(--mono);font-size:12px;color:var(--text3)}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid}
.tt{border-color:rgba(91,159,255,.35);color:var(--accent);background:rgba(91,159,255,.08)}
.td{border-color:rgba(74,222,128,.35);color:var(--green);background:rgba(74,222,128,.08)}
.cbtn{font-family:var(--mono);font-size:12px;padding:6px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.cbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
.cbtn.ok{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.ctitle{font-size:20px;font-weight:700;color:var(--text);line-height:1.4;padding:1.5rem 1.75rem 0;word-break:keep-all}
.acc-item{border-bottom:1px solid var(--border)}
.acc-item:last-child{border-bottom:none}
.acc-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.75rem;background:transparent;border:none;cursor:pointer;text-align:left;gap:10px;transition:background .15s}
.acc-btn:hover{background:rgba(255,255,255,.025)}
.acc-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;padding:5px 12px;border-radius:5px;font-weight:500}
.lc{background:rgba(91,159,255,.1);color:#7ab5ff;border:1px solid rgba(91,159,255,.25)}
.li{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.lr{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.lk{background:rgba(192,132,252,.1);color:#c084fc;border:1px solid rgba(192,132,252,.25)}
.acc-arrow{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{font-size:16px;color:var(--text2);line-height:2.0;padding:0 1.75rem 1.25rem;display:none;word-break:keep-all}
.acc-body.open{display:block}
.acc-body p{margin-bottom:.85rem}
.acc-body p:last-child{margin-bottom:0}
.nm{color:var(--accent);font-weight:700}
.cite{font-size:13px;color:var(--text3);font-family:var(--mono)}
.src-box{border-top:1px solid var(--border);padding:1rem 1.75rem;background:var(--bg3)}
.src-label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--text3);margin-bottom:8px}
.src-list{display:flex;flex-direction:column;gap:6px}
.src-item{display:flex;align-items:flex-start;gap:8px;font-size:14px;color:var(--text3);line-height:1.6}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0;margin-top:9px}
.src-txt{flex:1;word-break:keep-all}
.src-btn{flex-shrink:0;font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid rgba(91,159,255,.3);color:var(--accent);background:rgba(91,159,255,.06);text-decoration:none;white-space:nowrap}
.src-btn:hover{background:rgba(91,159,255,.18)}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>DEFENSE INTEL AGENT</div>
  <div class="hdate" id="hdate"></div>
</header>
<main>
  <div class="hero">
    <div class="hero-eyebrow">국방 오피니언 리더 보좌 시스템</div>
    <h1 class="hero-title">국방 인텔리전스<br>브리핑 에이전트</h1>
    <div class="hero-sub">방위사업청 「'25~'39 국방기술기획서」 10대 전략기술 · 박사급 심층 분석</div>
    <div class="cost-bar"><span class="cost-pill">Vercel 호스팅 무료</span><span>Claude API: 생성 1회당 약 ₩30</span></div>
  </div>
  <div class="ctrl-wrap">
    <span class="ctrl-label">방위사업청 10대 국방전략기술 분야</span>
    <div class="tech-grid">
      <button class="t-btn active" data-t="ai" data-l="① 인공지능(AI)"><span class="n">① AI</span>인공지능</button>
      <button class="t-btn" data-t="uav" data-l="② 유·무인복합"><span class="n">② 무인</span>유·무인복합</button>
      <button class="t-btn" data-t="quantum" data-l="③ 양자기술"><span class="n">③ 양자</span>양자기술</button>
      <button class="t-btn" data-t="space" data-l="④ 우주전력"><span class="n">④ 우주</span>우주전력</button>
      <button class="t-btn" data-t="energy" data-l="⑤ 지향성에너지"><span class="n">⑤ 에너지</span>지향성에너지</button>
      <button class="t-btn" data-t="material" data-l="⑥ 첨단소재"><span class="n">⑥ 소재</span>첨단소재</button>
      <button class="t-btn" data-t="cyber" data-l="⑦ 사이버·C4I"><span class="n">⑦ 사이버</span>사이버·C4I</button>
      <button class="t-btn" data-t="sensor" data-l="⑧ 센서·전자기전"><span class="n">⑧ 센서</span>센서·전자기전</button>
      <button class="t-btn" data-t="propulsion" data-l="⑨ 극초음속·추진"><span class="n">⑨ 추진</span>극초음속·추진</button>
      <button class="t-btn" data-t="wmd" data-l="⑩ WMD 대응"><span class="n">⑩ WMD</span>WMD 대응</button>
    </div>
    <div class="action-row">
      <div class="sel">선택된 분야: <strong id="selLabel">① 인공지능(AI)</strong></div>
      <div class="btn-group">
        <button class="nxt-btn" id="nxtBtn" onclick="genNext()">다음 자료 ↻</button>
        <button class="gen-btn" id="genBtn" onclick="genNew()">브리핑 생성 ↗</button>
      </div>
    </div>
  </div>
  <div class="counter" id="counter"></div>
  <div class="status" id="status">분야를 선택하고 브리핑 생성 버튼을 누르세요.</div>
  <div id="out"><div class="empty">10대 전략기술 분야를 선택하고 브리핑 생성을 누르세요<br><span style="font-size:14px;color:var(--text3)">자료 1건씩 · 박사급 심층 분석 · 인용 근거 · 참고 자료 구글 검색</span></div></div>
</main>
<script>
const today=new Date();
document.getElementById('hdate').textContent=today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
let cur='ai',cards=[],lastSub='';
document.querySelectorAll('.t-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.t-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');cur=b.dataset.t;
    document.getElementById('selLabel').textContent=b.dataset.l;
  });
});
function setSt(msg,loading=false){
  document.getElementById('status').innerHTML=loading?'<span class="spinner"></span><span style="color:#5b9fff">'+msg+'</span>':'<span>'+msg+'</span>';
}
function parseBlock(t){
  const r={};const re=/\[([^\]]+)\]\s*\n?([\s\S]+?)(?=\n\s*\[[^\]]+\]|$)/g;let m;
  while((m=re.exec(t))!==null){r[m[1].trim().toLowerCase().replace(/\s+/g,'')]=m[2].trim();}
  return r;
}
function toHtml(t){
  if(!t)return'';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(①|②|③|④|⑤|⑥)/g,'<span class="nm">$1</span>')
    .replace(/\(([^)]{4,60}(?:년|부|청|원|연구소|연구원|DARPA|RUSI|CSIS|RAND|합참|국방부)[^)]*)\)/g,' <span class="cite">($1)</span>')
    .replace(/\n{2,}/g,'</p><p>').replace(/\n/g,' ').replace(/^/,'<p>').replace(/$/,'</p>');
}
function acc(lbl,cls,content,open){
  const id='a'+Math.random().toString(36).slice(2);
  return '<div class="acc-item">'+
    '<button class="acc-btn" onclick="tog(\''+id+'\')">'+
      '<span class="acc-lbl '+cls+'">'+lbl+'</span>'+
      '<span class="acc-arrow'+(open?' open':'')+'" id="ar'+id+'">▼</span>'+
    '</button>'+
    '<div class="acc-body'+(open?' open':'')+'" id="'+id+'">'+toHtml(content)+'</div>'+
  '</div>';
}
function tog(id){
  const b=document.getElementById(id),a=document.getElementById('ar'+id),o=b.classList.contains('open');
  b.classList.toggle('open',!o);a.classList.toggle('open',!o);
}
function renderSrc(src){
  if(!src)return'';
  const lines=src.split(/\n/).map(l=>l.replace(/^\s*\d+[.)]\s*/,'').trim()).filter(l=>l.length>5);
  if(!lines.length)return'';
  const items=lines.map(l=>{
    const q=encodeURIComponent(l.replace(/,/g,' '));
    const e=l.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    return '<div class="src-item"><span class="src-dot"></span><span class="src-txt">'+e+'</span><a class="src-btn" href="https://www.google.com/search?q='+q+'" target="_blank">검색 ↗</a></div>';
  }).join('');
  return '<div class="src-box"><div class="src-label">참고 자료</div><div class="src-list">'+items+'</div></div>';
}
function copyCard(id){
  const card=document.getElementById(id);
  const btn=card.querySelector('.cbtn');
  const lines=[];
  const title=card.querySelector('.ctitle');
  if(title){lines.push(title.textContent.trim());lines.push('');}
  card.querySelectorAll('.acc-body').forEach(body=>{
    const lbl=body.previousElementSibling?.querySelector('.acc-lbl');
    if(lbl)lines.push('[ '+lbl.textContent.trim()+' ]');
    lines.push(body.textContent.trim());lines.push('');
  });
  const srcBox=card.querySelector('.src-box');
  if(srcBox){lines.push('[ 참고 자료 ]');srcBox.querySelectorAll('.src-txt').forEach(s=>lines.push('• '+s.textContent.trim()));}
  const text=lines.join('\n').trim();
  const done=()=>{btn.classList.add('ok');btn.innerHTML='✓ 복사됨';setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML='⎘ 복사';},2200);};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();});}
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();}
}
function renderCard(fullText,idx){
  const s=parseBlock(fullText);
  const title=s['제목']||'';
  const type=s['유형']||'';
  const domain=s['분야']||'';
  const content=s['핵심내용']||s['핵심 내용']||'';
  const impl=s['전략적시사점']||s['전략적 시사점']||'';
  const rdG=s['선진국rd']||s['선진국r&d']||s['선진국최신r&d방향']||s['선진국rnd']||'';
  const rdK=s['국내기획']||s['국내개발기획방향']||s['국내 기획']||'';
  const src=s['출처']||'';
  const id='card-'+idx;
  const hasSec=content||impl||rdG||rdK;
  const fb=!hasSec?fullText.replace(/===자료\d+===/g,'').trim():'';
  return '<div class="card" id="'+id+'">'+
    '<div class="card-head">'+
      '<div class="card-head-l">'+
        '<span class="cnum">자료 '+(idx+1)+'</span>'+
        '<div class="tags">'+
          (type?'<span class="tag tt">'+type+'</span>':'')+
          (domain?'<span class="tag td">'+domain.slice(0,22)+'</span>':'')+
        '</div>'+
      '</div>'+
      '<button class="cbtn" onclick="copyCard(\''+id+'\')">⎘ 복사</button>'+
    '</div>'+
    (title?'<div class="ctitle">'+title+'</div>':'')+
    '<div>'+
      (content?acc('핵심 내용','lc',content,true):'')+
      (impl?acc('전략적 시사점','li',impl,false):'')+
      (rdG?acc('선진국 최신 R&amp;D 방향','lr',rdG,false):'')+
      (rdK?acc('국내 개발 기획 방향','lk',rdK,false):'')+
      (fb?acc('브리핑 내용','lc',fb,true):'')+
    '</div>'+
    renderSrc(src)+
  '</div>';
}
async function doFetch(isNext){
  const genBtn=document.getElementById('genBtn');
  const nxtBtn=document.getElementById('nxtBtn');
  genBtn.disabled=true;nxtBtn.disabled=true;
  const body={topic:cur};
  if(isNext&&lastSub)body.subtopic=lastSub;
  let data=null,lastErr='';
  for(let attempt=1;attempt<=3;attempt++){
    setSt('브리핑 생성 중'+(attempt>1?' — 재시도 '+attempt+'/3':'')+'...',true);
    try{
      const res=await fetch('/api/briefing',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const rawText=await res.text();
      let parsed;
      try{parsed=JSON.parse(rawText);}catch(_){
        lastErr='서버 오류 ('+res.status+')';
        if(res.status===504||res.status===502){await new Promise(r=>setTimeout(r,300));continue;}
        break;
      }
      if(res.status===504||res.status===502){lastErr='타임아웃';await new Promise(r=>setTimeout(r,300));continue;}
      if(!res.ok||parsed.error){lastErr=parsed.error||'HTTP '+res.status;break;}
      if(!parsed.text){lastErr='빈 응답';break;}
      data=parsed;break;
    }catch(e){lastErr=e.message;if(attempt<3)await new Promise(r=>setTimeout(r,300));}
  }
  if(!data){
    document.getElementById('out').innerHTML='<div class="err">오류: '+lastErr+'<br><small style="opacity:.6">버튼을 다시 눌러보세요.</small></div>';
    setSt('오류 — 다시 시도해주세요');
    genBtn.disabled=false;nxtBtn.disabled=false;return;
  }
  lastSub=data.subtopic||'';
  const idx=cards.length;
  cards.push(data.text);
  const out=document.getElementById('out');
  if(!isNext){
    out.innerHTML='<div class="cards">'+renderCard(data.text,idx)+'</div>';
  }else{
    const cd=out.querySelector('.cards');
    if(cd)cd.insertAdjacentHTML('beforeend',renderCard(data.text,idx));
    else out.innerHTML='<div class="cards">'+renderCard(data.text,idx)+'</div>';
    setTimeout(()=>{document.getElementById('card-'+idx)?.scrollIntoView({behavior:'smooth',block:'start'});},100);
  }
  const ctr=document.getElementById('counter');
  ctr.classList.add('show');
  ctr.textContent='이번 세션: '+cards.length+'건 · '+cur+' 분야';
  nxtBtn.classList.add('show');
  setSt('브리핑 완료 — '+data.date+' · '+new Date().toLocaleTimeString('ko-KR'));
  genBtn.disabled=false;nxtBtn.disabled=false;
}
function genNew(){cards=[];lastSub='';document.getElementById('nxtBtn').classList.remove('show');doFetch(false);}
