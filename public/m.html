<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="국방브리핑">
<meta name="theme-color" content="#0d0f14">
<title>국방 브리핑 (모바일)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#f0f2f5;--text2:#b0b8c8;--text3:#6b7590;
  --accent:#5b9fff;--accent2:#1c3a6e;
  --green:#4ade80;--red:#f87171;
  --sans:'Noto Sans KR',sans-serif;
}
html{font-size:17px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.75;min-height:100vh}
header{background:rgba(13,15,20,0.97);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.logo{font-size:12px;letter-spacing:.1em;color:var(--accent);display:flex;align-items:center;gap:7px;font-weight:600}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.hdate{font-size:11px;color:var(--text3)}
main{padding:1.25rem .875rem 5rem;max-width:600px;margin:0 auto}
.hero{margin-bottom:1.25rem}
.hero-sub{font-size:12px;color:var(--text3);margin-bottom:.5rem}
.hero-title{font-size:clamp(22px,6vw,30px);font-weight:700;line-height:1.2;margin-bottom:.5rem}
.hero-desc{font-size:13px;color:var(--text2);word-break:keep-all}
.ctrl{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:.875rem;margin-bottom:1rem}
.ctrl-label{font-size:11px;color:var(--text3);letter-spacing:.1em;margin-bottom:10px;display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem}
.tb{font-size:14px;font-weight:500;padding:11px 6px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center;line-height:1.3;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:54px;width:100%}
.tb .n{font-size:10px;color:var(--text3);margin-bottom:2px}
.tb:active,.tb.active{background:var(--accent2);border-color:var(--accent);color:var(--accent)}
.tb.active .n{color:#7ab5ff}
.sel-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sel-txt{font-size:13px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-txt strong{color:var(--accent)}
.btns{display:flex;gap:6px;flex-shrink:0}
.gen{font-size:15px;font-weight:700;padding:12px 20px;border-radius:9px;border:1px solid var(--accent);background:var(--accent2);color:var(--accent);cursor:pointer;white-space:nowrap;min-height:46px}
.gen:active:not(:disabled){background:var(--accent);color:#fff}
.gen:disabled{opacity:.3;cursor:not-allowed}
.nxt{font-size:15px;font-weight:700;padding:12px 14px;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;display:none;min-height:46px}
.nxt:active:not(:disabled){border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.nxt.v{display:block}
.nxt:disabled{opacity:.3}
.status{font-size:12px;color:var(--text3);margin-bottom:.875rem;display:flex;align-items:center;gap:7px;min-height:20px}
.spinner{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem .5rem;border:1px dashed var(--border2);border-radius:12px;color:var(--text3);font-size:14px;line-height:2.2}
.err{padding:1rem;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:10px;color:var(--red);font-size:13px;line-height:1.7;word-break:break-all}
.cards{display:flex;flex-direction:column;gap:1.25rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-top{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);gap:8px}
.card-top-l{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cnum{font-size:11px;color:var(--text3)}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid}
.tt{border-color:rgba(91,159,255,.35);color:var(--accent);background:rgba(91,159,255,.08)}
.td{border-color:rgba(74,222,128,.35);color:var(--green);background:rgba(74,222,128,.08)}
.cbtn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;min-height:28px}
.cbtn:active{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
.cbtn.ok{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.08)}
.ctitle{font-size:17px;font-weight:700;color:var(--text);line-height:1.4;padding:.875rem 1rem 0;word-break:keep-all}
/* Accordion */
.acc-item{border-bottom:1px solid var(--border)}
.acc-item:last-child{border-bottom:none}
.acc-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:transparent;border:none;cursor:pointer;text-align:left;gap:8px}
.acc-label{font-size:11px;letter-spacing:.1em;font-weight:600;padding:4px 9px;border-radius:4px}
.lc{background:rgba(91,159,255,.1);color:#7ab5ff;border:1px solid rgba(91,159,255,.25)}
.li{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.lr{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.lk{background:rgba(192,132,252,.1);color:#c084fc;border:1px solid rgba(192,132,252,.25)}
.acc-arrow{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{font-size:15px;color:var(--text2);line-height:1.9;padding:0 1rem .875rem;word-break:keep-all;display:none}
.acc-body.open{display:block}
.acc-body p{margin-bottom:.75rem}
.acc-body p:last-child{margin-bottom:0}
.nm{color:var(--accent);font-weight:700}
.cite{font-size:12px;color:var(--text3)}
/* Sources */
.src-box{padding:.75rem 1rem;background:var(--bg3);border-top:1px solid var(--border)}
.src-label{font-size:10px;letter-spacing:.1em;color:var(--text3);margin-bottom:7px}
.src-list{display:flex;flex-direction:column;gap:6px}
.src-item{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--text3);line-height:1.6}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0;margin-top:8px}
.src-txt{flex:1;word-break:keep-all}
.src-btn{flex-shrink:0;font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid rgba(91,159,255,.3);color:var(--accent);background:rgba(91,159,255,.06);text-decoration:none;white-space:nowrap}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>DEFENSE INTEL AGENT</div>
  <div class="hdate" id="hdate"></div>
</header>
<main>
  <div class="hero">
    <div class="hero-sub">국방 오피니언 리더 보좌 시스템 · 모바일</div>
    <h1 class="hero-title">국방 인텔리전스<br>브리핑</h1>
    <div class="hero-desc">방위사업청 10대 전략기술 기반 · 박사급 심층 분석</div>
  </div>
  <div class="ctrl">
    <span class="ctrl-label">10대 국방전략기술 분야</span>
    <div class="grid" id="grid">
      <button class="tb active" data-t="ai" data-l="① 인공지능(AI)"><span class="n">① AI</span>인공지능</button>
      <button class="tb" data-t="uav" data-l="② 유·무인복합"><span class="n">② 무인</span>유·무인복합</button>
      <button class="tb" data-t="quantum" data-l="③ 양자기술"><span class="n">③ 양자</span>양자기술</button>
      <button class="tb" data-t="space" data-l="④ 우주전력"><span class="n">④ 우주</span>우주전력</button>
      <button class="tb" data-t="energy" data-l="⑤ 지향성에너지"><span class="n">⑤ 에너지</span>지향성에너지</button>
      <button class="tb" data-t="material" data-l="⑥ 첨단소재"><span class="n">⑥ 소재</span>첨단소재</button>
      <button class="tb" data-t="cyber" data-l="⑦ 사이버·C4I"><span class="n">⑦ 사이버</span>사이버·C4I</button>
      <button class="tb" data-t="sensor" data-l="⑧ 센서·전자기전"><span class="n">⑧ 센서</span>센서·전자기전</button>
      <button class="tb" data-t="propulsion" data-l="⑨ 극초음속·추진"><span class="n">⑨ 추진</span>극초음속·추진</button>
      <button class="tb" data-t="wmd" data-l="⑩ WMD 대응"><span class="n">⑩ WMD</span>WMD 대응</button>
    </div>
    <div class="sel-row">
      <div class="sel-txt">선택: <strong id="selLabel">① 인공지능(AI)</strong></div>
      <div class="btns">
        <button class="nxt" id="nxtBtn" onclick="genNext()">다음 ↻</button>
        <button class="gen" id="genBtn" onclick="genNew()">생성 ↗</button>
      </div>
    </div>
  </div>
  <div class="status" id="status">분야를 선택하고 생성 버튼을 누르세요.</div>
  <div id="out"><div class="empty">분야 선택 후 생성 버튼<br><span style="font-size:13px;color:var(--text3)">섹션별 접기/펼치기 지원</span></div></div>
</main>
<script>
const today=new Date();
document.getElementById('hdate').textContent=today.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
let cur='ai',cards=[],lastSub='';
document.querySelectorAll('.tb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');cur=b.dataset.t;
    document.getElementById('selLabel').textContent=b.dataset.l;
  });
});
function setSt(msg,loading=false){
  document.getElementById('status').innerHTML=loading?'<span class="spinner"></span><span style="color:#5b9fff">'+msg+'</span>':'<span>'+msg+'</span>';
}
function parseBlock(t){
  const r={};const re=/\[([^\]]+)\]\s*\n?([\s\S]+?)(?=\n\s*\[[^\]]+\]|$)/g;let m;
  while((m=re.exec(t))!==null){const k=m[1].trim().toLowerCase().replace(/\s+/g,'');r[k]=m[2].trim();}
  return r;
}
function toHtml(t){
  if(!t)return'';
  const e=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return e.replace(/(①|②|③|④|⑤|⑥)/g,'<span class="nm">$1</span>')
    .replace(/\(([^)]{4,50}(?:년|부|청|원|연구소|연구원|DARPA|RUSI|CSIS|합참|국방부)[^)]*)\)/g,' <span class="cite">($1)</span>')
    .replace(/\n{2,}/g,'</p><p>').replace(/\n/g,' ').replace(/^/,'<p>').replace(/$/,'</p>');
}
function acc(label,cls,content,open=false){
  const id='a'+Math.random().toString(36).slice(2);
  return '<div class="acc-item">'+
    '<button class="acc-btn" onclick="toggle(\''+id+'\')">'+
      '<span class="acc-label '+cls+'">'+label+'</span>'+
      '<span class="acc-arrow'+(open?' open':'\"')+'" id="ar'+id+'">▼</span>'+
    '</button>'+
    '<div class="acc-body'+(open?' open':'')+'" id="'+id+'">'+toHtml(content)+'</div>'+
  '</div>';
}
function toggle(id){
  const body=document.getElementById(id);
  const arrow=document.getElementById('ar'+id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
}
function renderSrc(src){
  if(!src)return'';
  const lines=src.split(/\n/).map(l=>l.replace(/^\s*\d+[.)]\s*/,'').trim()).filter(l=>l.length>5);
  if(!lines.length)return'';
  const items=lines.map(line=>{
    const q=encodeURIComponent(line.replace(/,/g,' '));
    const esc=line.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    return '<div class="src-item"><span class="src-dot"></span><span class="src-txt">'+esc+'</span><a class="src-btn" href="https://www.google.com/search?q='+q+'" target="_blank">검색↗</a></div>';
  }).join('');
  return '<div class="src-box"><div class="src-label">참고 자료</div><div class="src-list">'+items+'</div></div>';
}
function copyCard(id){
  const card=document.getElementById(id);
  const btn=card.querySelector('.cbtn');
  const lines=[];
  const title=card.querySelector('.ctitle');
  if(title){lines.push(title.textContent.trim());lines.push('');}
  card.querySelectorAll('.acc-body').forEach(body=>{
    const lbl=body.previousElementSibling?.querySelector('.acc-label');
    if(lbl)lines.push('[ '+lbl.textContent.trim()+' ]');
    lines.push(body.textContent.trim());lines.push('');
  });
  const srcBox=card.querySelector('.src-box');
  if(srcBox){lines.push('[ 참고 자료 ]');srcBox.querySelectorAll('.src-txt').forEach(s=>lines.push('• '+s.textContent.trim()));}
  const text=lines.join('\n').trim();
  const done=()=>{btn.classList.add('ok');btn.textContent='✓';setTimeout(()=>{btn.classList.remove('ok');btn.textContent='⎘';},2000);};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();});}
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();}
}
function renderCard(fullText,idx){
  const s=parseBlock(fullText);
  const title=s['제목']||'';
  const type=s['유형']||'';
  const domain=s['분야']||'';
  const content=s['핵심내용']||s['핵심 내용']||'';
  const impl=s['전략적시사점']||s['전략적 시사점']||'';
  const rdG=s['선진국rd']||s['선진국r&d']||s['선진국최신r&d방향']||s['선진국최신rd방향']||s['선진국rnd']||'';
  const rdK=s['국내기획']||s['국내개발기획방향']||s['국내 기획']||'';
  const src=s['출처']||'';
  const id='card-'+idx;
  const hasSec=content||impl||rdG||rdK;
  const fallback=!hasSec?fullText.replace(/===자료\d+===/g,'').trim():'';
  return '<div class="card" id="'+id+'">'+
    '<div class="card-top">'+
      '<div class="card-top-l">'+
        '<span class="cnum">자료 '+(idx+1)+'</span>'+
        '<div class="tags">'+
          (type?'<span class="tag tt">'+type+'</span>':'')+
          (domain?'<span class="tag td">'+domain.slice(0,18)+'</span>':'')+
        '</div>'+
      '</div>'+
      '<button class="cbtn" onclick="copyCard(\''+id+'\')">⎘</button>'+
    '</div>'+
    (title?'<div class="ctitle">'+title+'</div>':'')+
    '<div>'+
      (content?acc('핵심 내용','lc',content,true):'')+
      (impl?acc('전략적 시사점','li',impl,false):'')+
      (rdG?acc('선진국 최신 R&D 방향','lr',rdG,false):'')+
      (rdK?acc('국내 개발 기획 방향','lk',rdK,false):'')+
      (fallback?acc('브리핑 내용','lc',fallback,true):'')+
    '</div>'+
    renderSrc(src)+
  '</div>';
}
async function doFetch(isNext){
  const genBtn=document.getElementById('genBtn');
  const nxtBtn=document.getElementById('nxtBtn');
  genBtn.disabled=true;nxtBtn.disabled=true;
  setSt('브리핑 생성 중...',true);
  try{
    const body={topic:cur};
    if(isNext&&lastSub)body.subtopic=lastSub;
    const res=await fetch('/api/briefing',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    let data;
    try{data=await res.json();}catch(_){throw new Error('서버 응답 오류. 잠시 후 다시 시도해주세요.');}
    if(!res.ok||data.error)throw new Error(data.error||'HTTP '+res.status);
    if(!data.text)throw new Error('빈 응답. 다시 시도해주세요.');
    lastSub=data.subtopic||'';
    const idx=cards.length;
    cards.push(data.text);
    const html=renderCard(data.text,idx);
    const out=document.getElementById('out');
    if(!isNext){
      out.innerHTML='<div class="cards">'+html+'</div>';
    }else{
      const cd=out.querySelector('.cards');
      if(cd)cd.insertAdjacentHTML('beforeend',html);
      else out.innerHTML='<div class="cards">'+html+'</div>';
      setTimeout(()=>{document.getElementById('card-'+idx)?.scrollIntoView({behavior:'smooth',block:'start'});},100);
    }
    document.getElementById('nxtBtn').classList.add('v');
    setSt('완료 — '+data.date+' · '+new Date().toLocaleTimeString('ko-KR'));
  }catch(e){
    if(!isNext)document.getElementById('out').innerHTML='<div class="err">오류: '+e.message+'</div>';
    setSt('오류: '+e.message);
  }
  genBtn.disabled=false;nxtBtn.disabled=false;
}
function genNew(){cards=[];lastSub='';document.getElementById('nxtBtn').classList.remove('v');doFetch(false);}
function genNext(){doFetch(true);}
</script>
</body>
</html>
